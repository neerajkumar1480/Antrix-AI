<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Antrix - Sign In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#5F4A8B",
          "background-light": "#FEFACD",
          "background-dark": "#1a1910",
          "neutral-accent": "#5F4A8B",
        },
        fontFamily: {
          "display": ["Space Grotesk", "sans-serif"]
        },
        borderRadius: {
          "DEFAULT": "0.75rem",
          "lg": "1rem",
          "xl": "1.5rem",
          "full": "9999px"
        },
      },
    },
  }
</script>
<style>
  body {
    font-family: 'Space Grotesk', sans-serif;
  }
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }

  /* Isometric cube pattern for left panel */
  .cube-pattern {
    background-color: #e8e4b0;
    background-image:
      linear-gradient(30deg, rgba(150,140,90,0.15) 12%, transparent 12.5%, transparent 87%, rgba(150,140,90,0.15) 87.5%, rgba(150,140,90,0.15)),
      linear-gradient(150deg, rgba(150,140,90,0.15) 12%, transparent 12.5%, transparent 87%, rgba(150,140,90,0.15) 87.5%, rgba(150,140,90,0.15)),
      linear-gradient(30deg, rgba(120,110,60,0.1) 12%, transparent 12.5%, transparent 87%, rgba(120,110,60,0.1) 87.5%, rgba(120,110,60,0.1)),
      linear-gradient(150deg, rgba(120,110,60,0.1) 12%, transparent 12.5%, transparent 87%, rgba(120,110,60,0.1) 87.5%, rgba(120,110,60,0.1)),
      linear-gradient(60deg, rgba(180,170,100,0.12) 25%, transparent 25.5%, transparent 75%, rgba(180,170,100,0.12) 75%, rgba(180,170,100,0.12)),
      linear-gradient(60deg, rgba(180,170,100,0.12) 25%, transparent 25.5%, transparent 75%, rgba(180,170,100,0.12) 75%, rgba(180,170,100,0.12));
    background-size: 80px 140px;
    background-position: 0 0, 0 0, 40px 70px, 40px 70px, 0 0, 40px 70px;
  }

  /* Animated cube tiles */
  .cube-grid {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }

  .cube-tile {
    position: absolute;
    opacity: 0.85;
  }

  /* Smooth input focus */
  input:focus {
    outline: none;
  }

  /* Password toggle button */
  .password-toggle {
    cursor: pointer;
    user-select: none;
  }

  /* Checkbox custom style */
  .custom-checkbox {
    accent-color: #5F4A8B;
    width: 16px;
    height: 16px;
    cursor: pointer;
  }

  /* Sign in button hover effect */
  .signin-btn {
    background: #5F7A75;
    transition: all 0.2s ease;
  }
  .signin-btn:hover {
    background: #4e6a65;
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(95, 122, 117, 0.4);
  }
  .signin-btn:active {
    transform: translateY(0);
  }

  /* Google button */
  .google-btn {
    transition: all 0.2s ease;
    border: 1.5px solid #e2e8f0;
  }
  .google-btn:hover {
    background: #f8fafc;
    border-color: #cbd5e1;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  /* Input field styling */
  .form-input {
    border: 1.5px solid #e2e8f0;
    border-radius: 0.625rem;
    transition: border-color 0.2s, box-shadow 0.2s;
    background: white;
  }
  .form-input:focus {
    border-color: #5F4A8B;
    box-shadow: 0 0 0 3px rgba(95, 74, 139, 0.1);
  }

  /* Fade in animation */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in {
    animation: fadeInUp 0.5s ease forwards;
  }
  .fade-in-delay-1 { animation-delay: 0.1s; opacity: 0; }
  .fade-in-delay-2 { animation-delay: 0.2s; opacity: 0; }
  .fade-in-delay-3 { animation-delay: 0.3s; opacity: 0; }
  .fade-in-delay-4 { animation-delay: 0.4s; opacity: 0; }

  /* Left panel text animation */
  @keyframes slideInLeft {
    from { opacity: 0; transform: translateX(-24px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .slide-in-left {
    animation: slideInLeft 0.7s ease forwards;
  }
  .slide-in-delay-1 { animation-delay: 0.2s; opacity: 0; }
  .slide-in-delay-2 { animation-delay: 0.4s; opacity: 0; }
</style>
</head>
<body class="bg-white font-display min-h-screen">

<div class="flex min-h-screen">
  <!-- Left Panel - Isometric Cube Background -->
  <div class="hidden lg:flex lg:w-[48%] xl:w-[46%] relative cube-pattern overflow-hidden">
    <!-- SVG Isometric Cube Grid Overlay -->
    <svg class="absolute inset-0 w-full h-full" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
      <defs>
        <pattern id="cubePattern" x="0" y="0" width="80" height="92" patternUnits="userSpaceOnUse">
          <!-- Top face -->
          <polygon points="40,0 80,23 40,46 0,23" fill="rgba(220,210,150,0.5)" stroke="rgba(160,150,80,0.3)" stroke-width="0.8"/>
          <!-- Left face -->
          <polygon points="0,23 40,46 40,92 0,69" fill="rgba(190,180,110,0.4)" stroke="rgba(130,120,60,0.25)" stroke-width="0.8"/>
          <!-- Right face -->
          <polygon points="80,23 40,46 40,92 80,69" fill="rgba(200,190,120,0.35)" stroke="rgba(140,130,70,0.2)" stroke-width="0.8"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#cubePattern)"/>
    </svg>

    <!-- Content overlay -->
    <div class="relative z-10 flex flex-col justify-end p-12 pb-16">
      <div class="slide-in-left slide-in-delay-1">
        <h1 class="text-4xl xl:text-5xl font-bold text-slate-900 leading-[1.15] mb-4">
          Elevate Your<br/>Journey With<br/>Us.
        </h1>
      </div>
      <div class="slide-in-left slide-in-delay-2">
        <p class="text-slate-600 text-base font-medium max-w-xs leading-relaxed">
          Experience the next generation of seamless connectivity and premium design.
        </p>
      </div>
    </div>
  </div>

  <!-- Right Panel - Login Form -->
  <div class="flex-1 flex items-center justify-center px-8 py-12 sm:px-12 lg:px-16 xl:px-20 bg-white">
    <div class="w-full max-w-md">

      <!-- Logo - visible on mobile only -->
      <div class="flex lg:hidden items-center gap-2.5 mb-10">
        <img alt="Antrix Logo" class="h-7 w-auto" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAYIAAAFCCAIAAABzcE1qAAAMdElEQVR4nO3dz2scZRzH8e/MbLZJk22SpkmTpmnTNE3TNE3TNE3TNE3TNE3TNE3TNE3TNE3TNE3TNE3TNE3TNE3TNE3TNE3TNE3TNE3TNE3TNE3TNE3TNE3TNE3TNE3TNE3TNE3TNE3TNE3TNE3TNE3TNE3TNE3TNE3TNE3TNE3TNE3TNE3TNE3TNE3TNE3TNE3TNE3TNE3TNE3TNE3TNE3TNE3T" />
        <span class="text-xl font-bold tracking-tight text-primary">Antrix</span>
      </div>

      <!-- Header -->
      <div class="mb-8 fade-in fade-in-delay-1">
        <h2 class="text-3xl font-bold text-slate-900 mb-2">Welcome back</h2>
        <p class="text-slate-500 text-sm font-medium">Please enter your details to sign in to your account.</p>
      </div>

      <!-- Form -->
      <form class="space-y-5" onsubmit="handleSignIn(event)">

        <!-- Email Field -->
        <div class="fade-in fade-in-delay-2">
          <label class="block text-sm font-semibold text-slate-800 mb-1.5" for="email">
            Email Address
          </label>
          <input
            id="email"
            type="email"
            placeholder="name@company.com"
            class="form-input w-full px-4 py-3 text-slate-800 text-sm placeholder-slate-400 focus:outline-none"
          />
        </div>

        <!-- Password Field -->
        <div class="fade-in fade-in-delay-3">
          <div class="flex items-center justify-between mb-1.5">
            <label class="block text-sm font-semibold text-slate-800" for="password">
              Password
            </label>
            <a
              href="#"
              class="text-xs font-semibold text-[#5F7A75] hover:text-[#4e6a65] transition-colors"
              onclick="handleForgotPassword(event)"
            >
              Forgot password?
            </a>
          </div>
          <div class="relative">
            <input
              id="password"
              type="password"
              placeholder="••••••••••"
              class="form-input w-full px-4 py-3 text-slate-800 text-sm placeholder-slate-400 focus:outline-none pr-11"
              value="password123"
            />
            <button
              type="button"
              class="password-toggle absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors"
              onclick="togglePassword()"
            >
              <svg id="eye-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Remember Me -->
        <div class="fade-in fade-in-delay-3 flex items-center gap-2.5">
          <input
            type="checkbox"
            id="remember"
            class="custom-checkbox rounded"
          />
          <label for="remember" class="text-sm text-slate-600 font-medium cursor-pointer select-none">
            Remember me for 30 days
          </label>
        </div>

        <!-- Sign In Button -->
        <div class="fade-in fade-in-delay-4 pt-1">
          <button
            type="submit"
            class="signin-btn w-full py-3.5 px-6 text-white text-sm font-bold rounded-xl"
          >
            Sign in
          </button>
        </div>

        <!-- Divider -->
        <div class="fade-in fade-in-delay-4 flex items-center gap-4 py-1">
          <div class="flex-1 h-px bg-slate-200"></div>
          <span class="text-xs font-medium text-slate-400">Or continue with</span>
          <div class="flex-1 h-px bg-slate-200"></div>
        </div>

        <!-- Google Sign In -->
        <div class="fade-in fade-in-delay-4">
          <button
            type="button"
            class="google-btn w-full py-3 px-6 bg-white text-slate-700 text-sm font-semibold rounded-xl flex items-center justify-center gap-3"
            onclick="handleGoogleSignIn()"
          >
            <!-- Google Icon -->
            <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Sign in with Google
          </button>
        </div>

        <!-- Sign Up Link -->
        <div class="fade-in fade-in-delay-4 text-center pt-2">
          <span class="text-sm text-slate-500">Don't have an account? </span>
          <a
            href="#"
            class="text-sm font-semibold text-primary hover:text-primary/80 transition-colors"
            onclick="handleSignUp(event)"
          >
            Sign up
          </a>
        </div>

      </form>

    </div>
  </div>
</div>

<!-- Toast notification -->
<div id="toast" class="fixed bottom-6 right-6 bg-slate-900 text-white text-sm font-medium px-5 py-3 rounded-xl shadow-xl opacity-0 transition-all duration-300 translate-y-2 pointer-events-none">
  <span id="toast-msg"></span>
</div>

<script>
  function togglePassword() {
    const input = document.getElementById('password');
    const icon = document.getElementById('eye-icon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.innerHTML = `
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
      `;
    } else {
      input.type = 'password';
      icon.innerHTML = `
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
      `;
    }
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    document.getElementById('toast-msg').textContent = msg;
    toast.style.opacity = '1';
    toast.style.transform = 'translateY(0)';
    setTimeout(() => {
      toast.style.opacity = '0';
      toast.style.transform = 'translateY(8px)';
    }, 3000);
  }

  function handleSignIn(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    if (!email) {
      showToast('Please enter your email address.');
      return;
    }
    if (!password) {
      showToast('Please enter your password.');
      return;
    }

    // Simulate sign-in → redirect to resume upload
    showToast('Signing in...');
    setTimeout(() => {
      window.location.href = '../antrix_resume_upload/code.html';
    }, 1000);
  }

  function handleForgotPassword(e) {
    e.preventDefault();
    showToast('Password reset link sent to your email.');
  }

  function handleGoogleSignIn() {
    showToast('Redirecting to Google Sign-In...');
    setTimeout(() => {
      window.location.href = '../antrix_resume_upload/code.html';
    }, 1200);
  }

  function handleSignUp(e) {
    e.preventDefault();
    showToast('Redirecting to Sign Up...');
    setTimeout(() => {
      window.location.href = '../antrix_resume_upload/code.html';
    }, 800);
  }
</script>
</body>
</html>
