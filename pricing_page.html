  <!-- Light subtle background elements -->
  <div class="fixed inset-0 z-0 pointer-events-none" style="background-image: radial-gradient(circle at center, rgba(95,74,139,0.05) 1px, transparent 1px); background-size: 40px 40px;"></div>
  
  <div id="root" class="relative z-10 pt-20"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const { motion, AnimatePresence } = window.Motion;

    const ParticleExplosion = ({ x, y, color }) => {
      useEffect(() => {
        confetti({
          particleCount: 80,
          spread: 70,
          origin: { x: x / window.innerWidth, y: y / window.innerHeight },
          colors: [color, '#5F4A8B', '#ffffff'],
          disableForReducedMotion: true,
          ticks: 200,
          gravity: 0.6,
          scalar: 0.9,
          startVelocity: 30,
          zIndex: 0
        });
      }, [x, y, color]);
      return null;
    };

    const PricingCard = ({ tier, delay }) => {
      const [isHovered, setIsHovered] = useState(false);
      const [explosion, setExplosion] = useState(null);

      const handleSelect = (e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        setExplosion({ x: rect.left + rect.width / 2, y: rect.top + rect.height / 2, id: Date.now() });
      };

      const floatAnimate = {
        y: [0, -8, 0],
        rotate: [0, 1, -1, 0],
        transition: {
          duration: 6,
          repeat: Infinity,
          ease: "easeInOut",
          delay: delay
        }
      };

      let glowClass = "shadow-lg shadow-primary/5 hover:shadow-xl hover:shadow-primary/10";
      let btnColor = "bg-white border-2 border-primary/20 text-primary hover:bg-primary/5";
      let particleColor = "#5F4A8B";
      let iconColor = "text-primary/60";
      let borderClass = "border-primary/5 hover:border-primary/20";
      
      if (tier.name === "Standard") {
        borderClass = "border-primary/30 shadow-primary/20 hover:border-primary/50 hover:shadow-primary/30";
        btnColor = "bg-primary text-white hover:bg-primary/90 shadow-[0_4px_20px_rgba(95,74,139,0.3)]";
        particleColor = "#5F4A8B";
        iconColor = "text-primary";
      } else if (tier.name === "Premium") {
        borderClass = "border-slate-800/20 shadow-slate-800/10 hover:border-slate-800/40 hover:shadow-slate-800/20";
        btnColor = "bg-slate-900 text-white hover:bg-slate-800 shadow-[0_4px_20px_rgba(15,23,42,0.3)]";
        particleColor = "#0f172a";
        iconColor = "text-slate-800";
      }

      return (
        <motion.div
          initial={{ opacity: 0, y: 50 }}
          animate={{ opacity: 1, y: 0 }}
          transition={{ duration: 0.8, delay: delay * 0.3 }}
          className="relative h-full flex"
        >
          {explosion && <ParticleExplosion key={explosion.id} x={explosion.x} y={explosion.y} color={particleColor} />}
          
          <motion.div
            animate={isHovered ? { y: -15, scale: 1.02 } : floatAnimate}
            onHoverStart={() => setIsHovered(true)}
            onHoverEnd={() => setIsHovered(false)}
            className={`glass-card rounded-[2rem] p-8 flex flex-col w-full transition-all duration-300 z-10 ${glowClass} ${borderClass}`}
          >
            {tier.popular && (
              <div className="absolute -top-4 w-full left-0 flex justify-center">
                <div className="px-4 py-1.5 bg-primary text-white rounded-full text-xs font-bold tracking-widest uppercase shadow-lg shadow-primary/30">
                  Most Popular
                </div>
              </div>
            )}
            
            <div className="mb-8 mt-2">
              <h3 className="text-primary/60 text-sm font-bold tracking-widest uppercase mb-2">{tier.subtitle}</h3>
              <div className="flex items-baseline gap-2">
                <span className="text-4xl font-bold tracking-tight text-primary">{tier.name}</span>
              </div>
              <div className="mt-4 text-5xl font-bold tracking-tighter text-slate-800">${tier.price}<span className="text-lg text-slate-500 font-medium">/mo</span></div>
            </div>

            <div className="flex-1">
              <ul className="space-y-4 mb-10">
                {tier.features.map((feat, i) => (
                  <li key={i} className="flex items-start gap-3">
                    <svg className={`w-5 h-5 mt-0.5 shrink-0 ${iconColor}`} fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M5 13l4 4L19 7" />
                    </svg>
                    <span className="text-slate-700 font-medium leading-snug">{feat}</span>
                  </li>
                ))}
              </ul>
            </div>

            <button 
              onClick={handleSelect}
              className={`w-full py-4 rounded-xl font-bold transition-all duration-300 text-lg ${btnColor}`}
            >
              Select Plan
            </button>
          </motion.div>
        </motion.div>
      );
    };

    const PricingPage = () => {
      const tiers = [
        {
          name: "Basic",
          subtitle: "Explorer",
          price: "0",
          features: [
            "Resume Based Mock Interviews",
            "Voice Based Conversational AI",
            "Instant Automated Marking",
            "Personalized Progress Tracker",
            "Basic Performance Feedback"
          ],
          popular: false
        },
        {
          name: "Standard",
          subtitle: "Pro",
          price: "5",
          features: [
            "Everything in Basic Plan",
            "AI Video Analysis (Emotion & Body Language)",
            "Posture & Confidence Scoring",
            "Filler Word Detection & Analytics",
            "Goal-Oriented Actionable Pings"
          ],
          popular: true
        },
        {
          name: "Premium",
          subtitle: "Elite",
          price: "19",
          features: [
            "Everything in Standard Plan",
            "Specialized Technical & DSA Rounds",
            "Custom Interview Round Selector",
            "Problem-Based Deep Dive Sessions",
            "VIP Mentorship & Scenario Creator"
          ],
          popular: false
        }
      ];

      return (
        <div className="min-h-screen py-16 px-6 relative overflow-hidden flex flex-col items-center">
          
          {/* Subtle Ambient Nebulas matching light theme */}
          <div className="absolute top-0 right-0 w-[500px] h-[500px] bg-primary/10 rounded-full blur-[100px] pointer-events-none mix-blend-multiply"></div>
          <div className="absolute bottom-0 left-0 w-[600px] h-[600px] bg-indigo-300/20 rounded-full blur-[120px] pointer-events-none mix-blend-multiply"></div>

          <div className="max-w-6xl w-full mx-auto relative z-10 flex flex-col items-center mt-10">
            
            <motion.div 
              initial={{ opacity: 0, y: -30 }}
              animate={{ opacity: 1, y: 0 }}
              transition={{ duration: 1, ease: "easeOut" }}
              className="text-center mb-20 w-full"
            >
              <div className="inline-block px-5 py-2 bg-primary/10 text-primary text-sm font-bold uppercase tracking-widest rounded-full mb-6 relative">
                 Simple, Transparent Pricing
              </div>
              <h1 className="text-5xl md:text-7xl font-bold mb-6 tracking-tight text-primary">Invest in your career.</h1>
              <p className="text-xl text-slate-700 font-medium max-w-2xl mx-auto leading-relaxed">Choose the plan that perfectly fits your ambition and unlock the full power of AI interview preparation.</p>
            </motion.div>

            <div className="grid grid-cols-1 md:grid-cols-3 gap-8 lg:gap-12 items-stretch w-full mb-20">
              {tiers.map((tier, i) => (
                <PricingCard key={tier.name} tier={tier} delay={i} />
              ))}
            </div>
            
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PricingPage />);
  </script>
</body>
</html>
